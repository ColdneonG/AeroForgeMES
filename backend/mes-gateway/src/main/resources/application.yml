spring:
  application:
    name: mes-gateway
  servlet:
    multipart:
      enabled: false

server:
  port: 8080

fanmes:
  security:
    auth-enabled: true
  cors:
    allowed-origins: ${FANMES_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  jwt:
    secret: ${FANMES_JWT_SECRET:fan-mes-change-this-development-secret-2026}
    issuer: fan-mes
    expires-in-seconds: 28800
  gateway:
    routes:
      auth: http://localhost:8081
      system: http://localhost:8082
      equipment: http://localhost:8083
      report: http://localhost:8086
      integration: http://localhost:8087
      production: http://localhost:9103
      quality: http://localhost:9104
