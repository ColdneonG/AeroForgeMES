server:
  port: 9104

spring:
  application:
    name: mes-quality
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_QUALITY_URL:jdbc:mysql://localhost:3306/mes_quality?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}

management:
  endpoints:
    web:
      exposure:
        include: health,info
