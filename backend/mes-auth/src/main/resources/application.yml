server:
  port: 8081

spring:
  application:
    name: mes-auth
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/mes_auth?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true
    username: root
    password: 123456

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

fanmes:
  jwt:
    expires-in-seconds: 900
    refresh-expires-in-seconds: 604800
  auth:
    refresh-cookie:
      # Set FANMES_REFRESH_COOKIE_SECURE=true in production; HTTPS is required.
      secure: ${FANMES_REFRESH_COOKIE_SECURE:false}
